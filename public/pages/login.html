<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — CareerForge AI</title>
    <link rel="stylesheet" href="/css/main.css" />
</head>

<body>
    <div class="auth-page">
        <div class="auth-container animate-slideUp">
            <div class="auth-logo">
                <a href="/" style="font-size:1.8rem;font-weight:800;color:var(--primary);text-decoration:none">🚀
                    CareerForge AI</a>
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to continue your career journey</p>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" class="form-control" placeholder="you@example.com" required
                            autocomplete="email" />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" style="display:flex;justify-content:space-between">
                        <span>Password</span>
                        <a href="#" style="font-size:0.82rem;font-weight:500">Forgot password?</a>
                    </label>
                    <div class="input-group">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required
                            autocomplete="current-password" />
                        <span class="input-icon input-icon-right" id="togglePassword" style="cursor:pointer">👁️</span>
                    </div>
                </div>
                <div id="errorMsg" style="display:none" class="form-error mb-16"></div>
                <button type="submit" class="btn btn-primary w-100" id="loginBtn"
                    style="width:100%;justify-content:center">Sign In</button>
            </form>

            <div class="divider" style="text-align:center;position:relative"><span
                    style="background:var(--bg-card);padding:0 12px;color:var(--text-muted);font-size:0.85rem;position:absolute;top:-10px;left:50%;transform:translateX(-50%)">or</span>
            </div>

            <p style="text-align:center;font-size:0.9rem;color:var(--text-muted)">
                Don't have an account? <a href="/register" style="font-weight:700">Create one free</a>
            </p>

            <div
                style="margin-top:20px;padding:14px;background:rgba(79,70,229,0.06);border-radius:var(--radius);border:1px solid rgba(79,70,229,0.15);font-size:0.82rem;color:var(--text-muted)">
                <strong style="color:var(--primary)">Demo Account:</strong> demo@careerforge.ai / demo123
            </div>
        </div>
    </div>
    <script src="/js/utils.js"></script>
    <script>
        // Redirect if already logged in
        if (Auth.isLoggedIn()) window.location.href = '/dashboard';

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function () {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
            this.textContent = pwd.type === 'password' ? '👁️' : '🙈';
        });

        // Handle login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errMsg = document.getElementById('errorMsg');
            errMsg.style.display = 'none';
            UI.setLoading(btn, true, 'Signing in...');
            try {
                const res = await API.post('/auth/login', {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                });
                if (res.success) {
                    Auth.setSession(res.token, res.user);
                    Toast.success('Welcome back, ' + res.user.fullName.split(' ')[0] + '!');
                    const params = new URLSearchParams(window.location.search);
                    setTimeout(() => { window.location.href = params.get('redirect') || '/dashboard'; }, 800);
                } else {
                    errMsg.textContent = res.message || 'Login failed';
                    errMsg.style.display = 'block';
                    UI.setLoading(btn, false, 'Sign In');
                }
            } catch {
                errMsg.textContent = 'Connection error. Please try again.';
                errMsg.style.display = 'block';
                UI.setLoading(btn, false, 'Sign In');
            }
        });
    </script>
</body>

</html>
